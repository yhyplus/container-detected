apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-inference
  namespace: anomaly-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-inference
  template:
    metadata:
      labels:
        app: anomaly-inference
    spec:
      containers:
        - name: anomaly-inference
          image: anomaly-inference:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/serve_mlp_pure.py
            - --weights
            - /app/models/anomaly_mlp_weights.json
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-inference
  namespace: anomaly-test
spec:
  selector:
    app: anomaly-inference
  ports:
    - name: http
      port: 8080
      targetPort: 8080
